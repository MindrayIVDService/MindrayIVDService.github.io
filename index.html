<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mindray IVD International Service — Platform Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/auth.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --red:#C8102E;--red-dark:#9E0C24;--red-light:#FBEAEC;
    --g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g300:#CBD5E1;
    --g500:#64748B;--g700:#334155;--g900:#0F172A;
    --shadow:0 1px 2px rgba(15,23,42,.04),0 1px 3px rgba(15,23,42,.06);
    --shadow-md:0 4px 14px rgba(15,23,42,.07);
  }
  body{font-family:'Inter','PingFang SC','Microsoft YaHei',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--g50);color:var(--g900);min-height:100vh}
  .topbar{background:#fff;border-bottom:1px solid var(--g200);padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .logo{width:30px;height:30px;border-radius:7px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}
  .brand .name{font-weight:700;font-size:15px;color:var(--g900)}
  .user-box{font-size:12px;color:var(--g500);display:flex;align-items:center;gap:12px}
  .user-box button{padding:6px 12px;border:1px solid var(--g300);background:#fff;border-radius:6px;font-size:11.5px;cursor:pointer;color:var(--g700)}
  .user-box button:hover{border-color:var(--red);color:var(--red)}
  .wrap{max-width:1040px;margin:0 auto;padding:56px 28px}
  .wrap h1{font-size:22px;font-weight:700;margin-bottom:6px;letter-spacing:-.01em}
  .wrap .sub{font-size:13px;color:var(--g500);margin-bottom:32px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
  .card{background:#fff;border:1px solid var(--g200);border-radius:10px;padding:22px 20px;text-decoration:none;color:inherit;box-shadow:var(--shadow);transition:border-color .15s,box-shadow .15s,transform .15s;display:block}
  .card:hover{border-color:var(--red);box-shadow:var(--shadow-md);transform:translateY(-1px)}
  .card .icon{width:38px;height:38px;border-radius:8px;background:var(--red-light);color:var(--red);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:14px}
  .card .t{font-size:14px;font-weight:700;color:var(--g900);margin-bottom:3px}
  .card .cn{font-size:11px;color:var(--red);font-weight:600;margin-bottom:9px}
  .card .d{font-size:12px;color:var(--g500);line-height:1.5}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="logo">M</div>
    <div class="name">Mindray IVD International Service</div>
  </div>
  <div class="user-box">
    <span id="who">—</span>
    <button onclick="MRAuth.logout()">Log out · 退出登录</button>
  </div>
</div>

<div class="wrap">
  <h1>Platform Portal · 平台入口</h1>
  <div class="sub">Choose a platform to open · 选择要进入的平台</div>
  <div class="grid" id="card-grid"></div>
</div>

<script>
MRAuth.requireLogin({
  platform: null, // the portal itself isn't tied to one platform — any valid account may sign in here
  onSuccess: function(user) {
    document.getElementById('who').textContent = user.username + '  ·  ' + user.label;

    const PLATFORMS = [
      { code:'TLA', icon:'📊', title:'TLA Project Management Platform', cn:'TLA项目管理平台',
        desc:'Delivery records, capability coverage, global map.', href:'/tla/' },
      { code:'QE',  icon:'🔬', title:'QE Management Platform', cn:'QE管理平台',
        desc:'Quality engineering issue tracking & reporting.', href:'/qe/' },
      { code:'RTS', icon:'📈', title:'RTS Monthly Dashboard', cn:'RTS月度数据平台',
        desc:'International IVD user service monthly analytics.', href:'/rts/' },
      { code:'KB',  icon:'📚', title:'Knowledge Base', cn:'知识库平台',
        desc:'Shared documentation and reference materials.', href:'/kb/' },
      { code:'NPI', icon:'🚀', title:'NPI', cn:'新产品导入',
        desc:'New product introduction tracking.', href:'/NPI/' },
      { code:'SUP', icon:'💬', title:'Online Support', cn:'在线支持业务',
        desc:'Online support business dashboard.', href:'/support/' },
      { code:'TRN', icon:'🎓', title:'Training & Enablement', cn:'培训赋能',
        desc:'Training and enablement resources.', href:'/training/' },
      { code:'SLA', icon:'⏱️', title:'SLA Dashboard', cn:'SLA看板',
        desc:'Service level agreement tracking.', href:'/sla/' },
    ];

    const grid = document.getElementById('card-grid');
    grid.innerHTML = PLATFORMS.filter(p => user.platforms.indexOf(p.code) !== -1).map(p => {
      return `<a href="${p.href}" class="card">
        <div class="icon">${p.icon}</div>
        <div class="t">${p.title}</div>
        <div class="cn">${p.cn}</div>
        <div class="d">${p.desc}</div>
      </a>`;
    }).join('');
  }
});
</script>
</body>
</html>
